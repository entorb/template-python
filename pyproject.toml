[project]
name = "template-python"
version = "0.1.0"
description = "Torben's template for Python projects"
readme = "README.md"
requires-python = ">=3.14"
dependencies = ["tomli-w>=1.2.0"]

[tool.pytest.ini_options]
pythonpath = "src"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.1",
]
